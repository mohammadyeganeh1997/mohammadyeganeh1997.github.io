name: URL Fetch

on:
  issues:
    types: [opened]

jobs:
  fetch_url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Extract URL from issue body
        id: extract_url
        run: |
          echo "Fetching URL from issue body..."
          ISSUE_BODY="${{ github.event.issue.body }}"
          echo "Extracted URL: $(echo "$ISSUE_BODY" | grep -o 'https\?://[^ ]*')"
          URL=$(echo "$ISSUE_BODY" | grep -o 'https\?://[^ ]*')
          echo "::set-output name=url::$URL"

      - name: Fetch data from URL
        id: fetch_data
        run: |
          echo "Fetching data from the URL..."
          URL="${{ steps.extract_url.outputs.url }}"
          RESPONSE=$(curl -s "$URL")
          echo "Fetched data: $RESPONSE"
          echo "::set-output name=data::$RESPONSE"

      - name: Create Markdown file
        id: create_markdown
        run: |
          echo "Creating Markdown file..."
          DATA="${{ steps.fetch_data.outputs.data }}"
          FILENAME="fetched_data_$(date +%Y%m%d%H%M%S).md"
          echo -e "# Fetched Data\n\n\`\`\`\n$DATA\n\`\`\`" > $FILENAME
          echo "Created file: $FILENAME"
          echo "::set-output name=markdown_file::$FILENAME"

      - name: Publish to GitHub Pages
        run: |
          echo "Publishing Markdown file to GitHub Pages..."
          FILENAME="${{ steps.create_markdown.outputs.markdown_file }}"
          mkdir -p docs
          cp $FILENAME docs/
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add docs/$FILENAME
          git commit -m "Add fetched data Markdown file"
          git push

      - name: Comment on issue with fetched data
        run: |
          echo "Posting fetched data back to the issue..."
          DATA="${{ steps.fetch_data.outputs.data }}"
          COMMENT_BODY="**Fetched Data:**\n\`\`\`\n$DATA\n\`\`\`\n\nYou can view the detailed output [here](https://<USERNAME>.github.io/<REPOSITORY_NAME>/docs/$FILENAME)."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -d "{\"body\": \"$COMMENT_BODY\"}"
